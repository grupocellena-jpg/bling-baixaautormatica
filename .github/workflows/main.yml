name: Automacao Baixa Bling V2

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Executar Motor de Baixa
        env:
          BLING_API_KEY: ${{ secrets.BLING_API_KEY }}
        run: |
          python - <<EOF
          import os
          import requests

          api_key = os.getenv('BLING_API_KEY')
          base_url = "https://bling.com.br/Api/v2"

          print("🛠️ INICIANDO MOTOR V2 OFICIAL...")

          def buscar_contas():
              url = f"{base_url}/contasreceber/json/?filters=situacao[atrasada]&apikey={api_key}"
              res = requests.get(url)
              if res.status_code == 200:
                  dados = res.json()
                  return dados.get('retorno', {}).get('contasreceber', [])
              return []

          def baixar_conta(id_conta):
              url = f"{base_url}/contareceber/{id_conta}/liquidar/json/?apikey={api_key}"
              res = requests.post(url)
              return res.status_code == 200

          contas = buscar_contas()
          print(f"📌 Encontradas {len(contas)} contas atrasadas.")

          for item in contas:
              c_id = item['contaReceber']['id']
              if baixar_conta(c_id):
                  print(f"✅ Conta {c_id} baixada com sucesso!")
              else:
                  print(f"❌ Erro ao baixar conta {c_id}")
          
          print("🏁 PROCESSO FINALIZADO")
          EOF
