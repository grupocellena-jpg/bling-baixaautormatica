name: Automação Baixa Bling

on:
  schedule:
    # Roda todos os dias às 06:00 UTC (03:00 no horário de Brasília)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite que você rode manualmente clicando em um botão no GitHub

jobs:
  baixar-contas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Executar Script de Baixa
        env:
          # Puxa a chave que você salvou nos Secrets do GitHub
          BLING_API_KEY: ${{ secrets.BLING_API_KEY }}
        run: |
          python - <<EOF
          import os
          import requests

          api_key = os.getenv('BLING_API_KEY')
          base_url = "https://bling.com.br/Api/v2"

          def buscar_contas_atrasadas():
              # Filtra por contas atrasadas (vencidas)
              url = f"{base_url}/contasreceber/json/?filters=situacao[atrasada]&apikey={api_key}"
              response = requests.get(url)
              dados = response.json()
              
              if 'retorno' in dados and 'contasreceber' in dados['retorno']:
                  return dados['retorno']['contasreceber']
              return []

          def baixar_conta(id_conta):
              # Liquida a conta na data atual
              url = f"{base_url}/contareceber/{id_conta}/liquidar/json/?apikey={api_key}"
              response = requests.post(url)
              return response.status_code == 200

          contas = buscar_contas_atrasadas()
          print(f"Encontradas {len(contas)} contas atrasadas.")

          for item in contas:
              conta_id = item['contaReceber']['id']
              if baixar_conta(conta_id):
                  print(f"Conta ID {conta_id} baixada com sucesso!")
              else:
                  print(f"Erro ao baixar conta ID {conta_id}")
          EOF
