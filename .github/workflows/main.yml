name: Automacao Baixa Bling V2

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Executar Motor de Baixa
        env:
          BLING_API_KEY: ${{ secrets.BLING_API_KEY }}
        run: |
          python - <<EOF
          import os
          import requests
          from datetime import datetime

          api_key = os.getenv('BLING_API_KEY')
          base_url = "https://bling.com.br/Api/v2"
          hoje = datetime.now().date()

          print(f"🛠️ INICIANDO MOTOR V2 (Busca: Atrasadas + Em Aberto Vencidas)")

          def buscar_contas(situacao):
              url = f"{base_url}/contasreceber/json/?filters=situacao[{situacao}]&apikey={api_key}"
              res = requests.get(url)
              if res.status_code == 200:
                  dados = res.json()
                  return dados.get('retorno', {}).get('contasreceber', [])
              return []

          def baixar_conta(id_conta):
              url = f"{base_url}/contareceber/{id_conta}/liquidar/json/?apikey={api_key}"
              res = requests.post(url)
              return res.status_code == 200

          # Busca nos dois status para não perder nada
          todas_contas = buscar_contas('atrasada') + buscar_contas('em aberto')
          
          contas_para_baixar = []
          for item in todas_contas:
              conta = item['contaReceber']
              vencimento_str = conta.get('vencimento')
              
              if vencimento_str:
                  vencimento = datetime.strptime(vencimento_str, '%Y-%m-%d').date()
                  # Se a conta está vencida (data menor que hoje)
                  if vencimento < hoje:
                      contas_para_baixar.append(conta['id'])

          print(f"📌 Encontradas {len(contas_para_baixar)} contas vencidas para processar.")

          for c_id in contas_para_baixar:
              if baixar_conta(c_id):
                  print(f"✅ Conta {c_id} baixada com sucesso!")
              else:
                  print(f"❌ Erro ao baixar conta {c_id}")
          
          print("🏁 PROCESSO FINALIZADO")
          EOF
