name: Robo Baixa Oficial Cellena

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  baixa-bling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Dependencias
        run: pip install requests
      - name: Rodar Baixa
        env:
          BLING_API_KEY: ${{ secrets.BLING_API_KEY }}
        run: |
          python - <<EOF
          import os, requests
          from datetime import datetime
          api_key = os.getenv('BLING_API_KEY')
          base_url = "https://bling.com.br/Api/v2"
          hoje = datetime.now().date()
          
          print("🛠️ MOTOR ATUALIZADO (Focando nas contas RECENTES)")
          
          def buscar_e_baixar():
              processadas = 0
              for sit in ['em aberto', 'atrasada']:
                  # Mudamos aqui: ele vai pedir as contas ordenadas pela data de vencimento
                  url = f"{base_url}/contasreceber/json/?filters=situacao[{sit}]; dataVencimento[2020-01-01 TO {hoje}]&apikey={api_key}"
                  r = requests.get(url)
                  contas = r.json().get('retorno', {}).get('contasreceber', []) if r.status_code == 200 else []
                  
                  # Invertemos a lista para pegar as últimas (mais recentes) primeiro
                  for item in reversed(contas):
                      c = item['contaReceber']
                      venc_str = c.get('vencimento')
                      if venc_str:
                          venc = datetime.strptime(venc_str, '%Y-%m-%d').date()
                          if venc < hoje:
                              res = requests.post(f"{base_url}/contareceber/{c['id']}/liquidar/json/?apikey={api_key}")
                              if res.status_code == 200:
                                  print(f"✅ Baixada: ID {c['id']} | Venc: {venc_str}")
                                  processadas += 1
              return processadas

          total = buscar_e_baixar()
          print(f"🏁 FIM: {total} contas processadas.")
          EOF
