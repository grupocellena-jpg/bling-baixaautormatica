name: Robo Baixa Oficial Cellena

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  baixa-bling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Dependencias
        run: pip install requests
      - name: Rodar Baixa
        env:
          BLING_API_KEY: ${{ secrets.BLING_API_KEY }}
        run: |
          python - <<EOF
          import os, requests
          from datetime import datetime
          api_key = os.getenv('BLING_API_KEY')
          base_url = "https://bling.com.br/Api/v2"
          hoje = datetime.now().date()
          
          print("🛠️ MOTOR FINAL - MODO ALTERAÇÃO DE STATUS")
          
          def processar():
              processadas = 0
              # Buscamos as contas em aberto
              r = requests.get(f"{base_url}/contasreceber/json/?filters=situacao[em aberto]&apikey={api_key}")
              if r.status_code != 200:
                  print("Erro ao acessar API")
                  return 0
              
              contas = r.json().get('retorno', {}).get('contasreceber', [])
              
              for item in contas:
                  c = item['contaReceber']
                  venc_str = c.get('vencimento')
                  c_id = c.get('id')
                  
                  if venc_str:
                      venc = datetime.strptime(venc_str, '%Y-%m-%d').date()
                      # Se a conta está vencida
                      if venc < hoje:
                          # XML para mudar o status para 'pago' (liquidação simples)
                          xml_baixa = f"""<?xml version="1.0" encoding="UTF-8"?>
                          <contareceber>
                            <situacao>pago</situacao>
                          </contareceber>"""
                          
                          url_put = f"{base_url}/contareceber/{c_id}/json/"
                          res = requests.post(url_put, data={'apikey': api_key, 'xml': xml_baixa})
                          
                          if res.status_code in [200, 201]:
                              print(f"✅ SUCESSO: Conta {c_id} alterada para PAGO (Venc: {venc_str})")
                              processadas += 1
                          else:
                              print(f"❌ FALHA: Conta {c_id} - Erro: {res.text}")
              return processadas

          total = processar()
          print(f"🏁 FIM: {total} contas processadas.")
          EOF
