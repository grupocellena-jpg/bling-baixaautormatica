name: baixa-bling

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  baixa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests pynacl

      - name: Rodar automação completa
        env:
          CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<EOF
          import requests
          import os
          import time
          import base64
          from datetime import datetime
          from nacl import encoding, public

          CLIENT_ID = os.getenv("CLIENT_ID")
          CLIENT_SECRET = os.getenv("CLIENT_SECRET")
          REFRESH_TOKEN = os.getenv("REFRESH_TOKEN")
          GH_TOKEN = os.getenv("GH_TOKEN")
          REPO = os.getenv("REPO")

          print("🔄 Atualizando token Bling...")

          token_url = "https://api.bling.com.br/Api/v3/oauth/token"

          payload = {
              "grant_type": "refresh_token",
              "refresh_token": REFRESH_TOKEN
          }

          response = requests.post(
              token_url,
              data=payload,
              auth=(CLIENT_ID, CLIENT_SECRET)
          )

          token_data = response.json()
          print("📡 TOKEN:", token_data)

          if "access_token" not in token_data:
              print("❌ ERRO TOKEN")
              exit(1)

          access_token = token_data["access_token"]
          new_refresh = token_data["refresh_token"]

          print("✅ Token atualizado")

          # =========================
          # 🔐 ATUALIZAR SECRET NO GITHUB
          # =========================
          print("🔐 Atualizando refresh_token no GitHub...")

          headers = {
              "Authorization": f"Bearer {GH_TOKEN}",
              "Accept": "application/vnd.github+json"
          }

          # pegar chave pública
          key_url = f"https://api.github.com/repos/{REPO}/actions/secrets/public-key"
          key_data = requests.get(key_url, headers=headers).json()

          public_key = key_data["key"]
          key_id = key_data["key_id"]

          # criptografar
          public_key_obj = public.PublicKey(public_key.encode("utf-8"), encoding.Base64Encoder())
          sealed_box = public.SealedBox(public_key_obj)
          encrypted = sealed_box.encrypt(new_refresh.encode("utf-8"))
          encrypted_value = base64.b64encode(encrypted).decode("utf-8")

          # enviar novo secret
          put_url = f"https://api.github.com/repos/{REPO}/actions/secrets/BLING_REFRESH_TOKEN"

          put_response = requests.put(
              put_url,
              headers=headers,
              json={
                  "encrypted_value": encrypted_value,
                  "key_id": key_id
              }
          )

          print("STATUS GITHUB:", put_response.status_code)

          if put_response.status_code in [201, 204]:
              print("✅ Refresh token atualizado no GitHub")
          else:
              print("❌ Falha ao atualizar token no GitHub:", put_response.text)

          headers_api = {
              "Authorization": f"Bearer {access_token}",
              "Content-Type": "application/json"
          }

          # =========================
          # 📥 BUSCAR CONTAS
          # =========================
          print("📡 Buscando contas...")

          url = "https://api.bling.com.br/Api/v3/contas/receber"
          res = requests.get(url, headers=headers_api)

          if res.status_code != 200:
              print("❌ ERRO AO BUSCAR CONTAS:", res.text)
              exit(1)

          contas = res.json().get("data", [])
          print(f"📊 {len(contas)} contas encontradas")

          hoje = datetime.now().date()

          # =========================
          # 🔄 BAIXA AUTOMÁTICA
          # =========================
          print("🔄 Iniciando baixa automática (ATRASADAS)...")

          for conta in contas:
              try:
                  venc = datetime.strptime(conta["vencimento"], "%Y-%m-%d").date()

                  # apenas contas em aberto
                  if conta["situacao"] == 1 and venc < hoje:

                      print(f"⏰ Baixando: {conta['id']} | R$ {conta['valor']}")

                      baixa_url = f"https://api.bling.com.br/Api/v3/contas/receber/{conta['id']}/baixar"

                      payload = {
                          "data": {
                              "data": str(hoje),
                              "valor": conta["valor"]
                          }
                      }

                      r = requests.post(baixa_url, json=payload, headers=headers_api)

                      print("STATUS:", r.status_code)
                      print("RESPOSTA:", r.text)

                      # evitar bloqueio da API
                      time.sleep(0.5)

              except Exception as e:
                  print(f"⚠️ Erro na conta {conta.get('id')}: {str(e)}")

          print("🏁 FINALIZADO")
          EOF

      - name: Complete job
        run: echo "Processo finalizado"
