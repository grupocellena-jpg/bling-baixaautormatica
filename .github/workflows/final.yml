name: Baixa automática Bling (DEBUG FINAL)

on:
  workflow_dispatch:

jobs:
  baixar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - run: pip install requests pynacl

      - name: Executar robô
        env:
          CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}

        run: |
          python - <<EOF
          import requests, base64, time, os
          from datetime import datetime
          from nacl import encoding, public

          def log(msg):
              print(msg, flush=True)

          CLIENT_ID = os.getenv("CLIENT_ID")
          CLIENT_SECRET = os.getenv("CLIENT_SECRET")
          REFRESH_TOKEN = os.getenv("REFRESH_TOKEN")
          GH_TOKEN = os.getenv("GH_TOKEN")
          REPO = os.getenv("REPO")

          hoje = datetime.now().strftime("%Y-%m-%d")

          # =========================
          # TOKEN
          # =========================
          log("🔄 Atualizando token...")

          auth = base64.b64encode(f"{CLIENT_ID}:{CLIENT_SECRET}".encode()).decode()

          res = requests.post(
              "https://www.bling.com.br/Api/v3/oauth/token",
              headers={
                  "Authorization": f"Basic {auth}",
                  "Content-Type": "application/x-www-form-urlencoded"
              },
              data={
                  "grant_type": "refresh_token",
                  "refresh_token": REFRESH_TOKEN
              }
          )

          if res.status_code != 200:
              log(f"❌ ERRO TOKEN: {res.text}")
              exit()

          data = res.json()
          access_token = data["access_token"]
          new_refresh = data["refresh_token"]

          log("✅ Token OK")

          # =========================
          # 🔎 TESTE: BUSCAR PEDIDO POR numeroLoja
          # =========================
          log("🔎 Testando busca por numeroLoja...")

          numero_loja = "2000015645601946"  # <-- pode trocar depois

          r = requests.get(
              f"https://api.bling.com.br/Api/v3/pedidos/vendas?numeroLoja={numero_loja}",
              headers={"Authorization": f"Bearer {access_token}"}
          )

          log(f"STATUS BUSCA PEDIDO: {r.status_code}")

          try:
              resp = r.json()
              if resp.get("data"):
                  log("✅ Pedido encontrado no Bling!")
                  log(resp["data"][0])  # mostra o primeiro
              else:
                  log("⚠️ Nenhum pedido encontrado com esse numeroLoja")
          except:
              log(f"❌ Erro ao interpretar resposta: {r.text}")

          # =========================
          # SALVAR REFRESH
          # =========================
          try:
              key = requests.get(
                  f"https://api.github.com/repos/{REPO}/actions/secrets/public-key",
                  headers={"Authorization": f"Bearer {GH_TOKEN}"}
              ).json()

              pk = public.PublicKey(key["key"].encode(), encoding.Base64Encoder())
              sealed = public.SealedBox(pk)
              encrypted = base64.b64encode(sealed.encrypt(new_refresh.encode())).decode()

              requests.put(
                  f"https://api.github.com/repos/{REPO}/actions/secrets/BLING_REFRESH_TOKEN",
                  headers={"Authorization": f"Bearer {GH_TOKEN}"},
                  json={
                      "encrypted_value": encrypted,
                      "key_id": key["key_id"]
                  }
              )

              log("🔐 Refresh atualizado")
          except Exception as e:
              log(f"⚠️ Falha ao salvar refresh: {e}")

          # =========================
          # BUSCAR CONTAS
          # =========================
          contas = []
          page = 1
          MAX_PAGES = 100

          log("🔍 Buscando contas...")

          while page <= MAX_PAGES:
              r = requests.get(
                  f"https://www.bling.com.br/Api/v3/contas/receber?pagina={page}",
                  headers={"Authorization": f"Bearer {access_token}"}
              )

              data = r.json()

              if not data.get("data"):
                  break

              contas.extend(data["data"])
              log(f"📄 Página {page}")

              page += 1
              time.sleep(0.2)

          log(f"📊 Total: {len(contas)} contas")

          # =========================
          # DEBUG REAL (AMOSTRA)
          # =========================
          log("🧪 DEBUG PRIMEIRA CONTA:")
          if contas:
              c = contas[0]
              log({
                  "id": c.get("id"),
                  "situacao": c.get("situacao"),
                  "dataVencimento": c.get("dataVencimento"),
                  "valor": c.get("valor")
              })

          # =========================
          # BAIXAR (FILTRO FLEXÍVEL)
          # =========================
          baixadas = 0

          for c in contas:
              try:
                  venc = c.get("dataVencimento")

                  if not venc:
                      continue

                  if venc >= hoje:
                      continue

                  idc = c["id"]
                  valor = float(c.get("valor", 0))

                  payload = {
                      "valor": valor,
                      "dataPagamento": hoje
                  }

                  r = requests.post(
                      f"https://www.bling.com.br/Api/v3/contas/receber/{idc}/baixar",
                      headers={"Authorization": f"Bearer {access_token}"},
                      json=payload
                  )

                  if r.status_code in [200, 201]:
                      baixadas += 1
                      log(f"✅ {idc}")

                  elif "já foi baixada" in r.text:
                      continue

                  else:
                      log(f"⚠️ {idc}: {r.text}")

                  time.sleep(0.15)

              except Exception as e:
                  log(f"⚠️ erro item: {e}")

          log(f"🏁 FINAL: {baixadas} contas baixadas")
          EOF
