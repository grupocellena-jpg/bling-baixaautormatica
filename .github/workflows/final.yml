name: Robo Baixa Oficial Cellena

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  baixa-bling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Dependencias
        run: pip install requests
      - name: Rodar Baixa
        env:
          BLING_API_KEY: ${{ secrets.BLING_API_KEY }}
        run: |
          python - <<EOF
          import os, requests
          from datetime import datetime
          api_key = os.getenv('BLING_API_KEY')
          base_url = "https://bling.com.br/Api/v2"
          hoje = datetime.now().date()
          
          print("🛠️ MOTOR V2 ATUALIZADO (Limpando tudo que estiver vencido)")
          
          def buscar_e_baixar():
              processadas_agora = 0
              for sit in ['atrasada', 'em aberto']:
                  # Busca as 100 primeiras de cada status
                  r = requests.get(f"{base_url}/contasreceber/json/?filters=situacao[{sit}]&apikey={api_key}")
                  contas = r.json().get('retorno', {}).get('contasreceber', []) if r.status_code == 200 else []
                  
                  for item in contas:
                      c = item['contaReceber']
                      venc_str = c.get('vencimento')
                      if venc_str:
                          venc = datetime.strptime(venc_str, '%Y-%m-%d').date()
                          if venc < hoje:
                              # Tenta liquidar
                              res = requests.post(f"{base_url}/contareceber/{c['id']}/liquidar/json/?apikey={api_key}")
                              if res.status_code == 200:
                                  print(f"✅ Baixada: ID {c['id']} | Venc: {venc_str}")
                                  processadas_agora += 1
              return processadas_agora

          total = buscar_e_baixar()
          print(f"🏁 FIM: {total} contas processadas nesta rodada.")
          EOF
