name: Baixa automática Bling

on:
  workflow_dispatch:

jobs:
  baixar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests pynacl

      - name: Executar robô Bling
        env:
          CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<EOF
          import requests
          import os
          import time
          from datetime import datetime
          import base64
          from nacl import encoding, public

          CLIENT_ID = os.getenv("CLIENT_ID")
          CLIENT_SECRET = os.getenv("CLIENT_SECRET")
          REFRESH_TOKEN = os.getenv("REFRESH_TOKEN")
          GH_TOKEN = os.getenv("GH_TOKEN")
          REPO = os.getenv("REPO")

          # ===============================
          # 🔄 ATUALIZAR TOKEN (CORREÇÃO AQUI)
          # ===============================
          print("🔄 Atualizando token...")

          response = requests.post(
              "https://www.bling.com.br/Api/v3/oauth/token",
              json={
                  "grant_type": "refresh_token",
                  "refresh_token": REFRESH_TOKEN,
                  "client_id": CLIENT_ID,
                  "client_secret": CLIENT_SECRET
              },
              headers={"Content-Type": "application/json"},
              timeout=10
          )

          token_data = response.json()
          print("📡 RESPOSTA TOKEN:", token_data)

          if "access_token" not in token_data:
              print("❌ ERRO NO TOKEN")
              exit()

          access_token = token_data["access_token"]
          new_refresh_token = token_data["refresh_token"]

          print("✅ Token atualizado")

          # ===============================
          # 🔐 ATUALIZAR REFRESH TOKEN NO GITHUB
          # ===============================
          print("🔐 Atualizando refresh_token no GitHub...")

          headers = {
              "Authorization": f"token {GH_TOKEN}",
              "Accept": "application/vnd.github+json"
          }

          key_resp = requests.get(
              f"https://api.github.com/repos/{REPO}/actions/secrets/public-key",
              headers=headers,
              timeout=10
          ).json()

          public_key = key_resp["key"]
          key_id = key_resp["key_id"]

          public_key_obj = public.PublicKey(
              public_key.encode("utf-8"),
              encoding.Base64Encoder()
          )

          sealed_box = public.SealedBox(public_key_obj)

          encrypted = sealed_box.encrypt(new_refresh_token.encode("utf-8"))
          encrypted_value = base64.b64encode(encrypted).decode("utf-8")

          requests.put(
              f"https://api.github.com/repos/{REPO}/actions/secrets/BLING_REFRESH_TOKEN",
              headers=headers,
              json={
                  "encrypted_value": encrypted_value,
                  "key_id": key_id
              },
              timeout=10
          )

          print("✅ Refresh token salvo automaticamente")

          # ===============================
          # 🔎 BUSCAR CONTAS
          # ===============================
          print("🔎 Buscando contas...")

          contas = []
          pagina = 1

          while True:
              resp = requests.get(
                  "https://www.bling.com.br/Api/v3/contas/receber",
                  headers={"Authorization": f"Bearer {access_token}"},
                  params={"pagina": pagina},
                  timeout=10
              )

              if resp.status_code != 200:
                  print("❌ Erro ao buscar contas:", resp.text)
                  break

              data = resp.json().get("data", [])

              if not data:
                  break

              contas.extend(data)
              print(f"📄 Página {pagina} ({len(data)})")

              pagina += 1
              time.sleep(0.4)

          print(f"📊 Total: {len(contas)} contas")

          # ===============================
          # 🔽 BAIXAR ATRASADAS
          # ===============================
          hoje = datetime.now().date()
          baixadas = 0

          print("🔄 Iniciando baixas...")

          for conta in contas:
              try:
                  id_conta = conta["id"]
                  situacao = conta["situacao"]

                  data_venc = conta.get("dataVencimento") or conta.get("vencimento")
                  if not data_venc:
                      continue

                  vencimento = datetime.strptime(data_venc, "%Y-%m-%d").date()

                  if situacao in [2, 3] and vencimento < hoje:

                      print(f"⏰ ATRASADA: {id_conta}")

                      for tentativa in range(3):

                          resp = requests.post(
                              f"https://www.bling.com.br/Api/v3/contas/receber/{id_conta}/baixar",
                              headers={
                                  "Authorization": f"Bearer {access_token}",
                                  "Content-Type": "application/json"
                              },
                              json={
                                  "valor": conta.get("valor", 0),
                                  "data": str(hoje)
                              },
                              timeout=10
                          )

                          if resp.status_code in [200, 204]:
                              print(f"✅ Baixada: {id_conta}")
                              baixadas += 1
                              break

                          elif resp.status_code == 429:
                              print("⏳ Rate limit...")
                              time.sleep(2)

                          elif "já foi baixada" in resp.text:
                              print(f"⚠️ Já estava baixada: {id_conta}")
                              break

                          else:
                              print("❌ Erro:", resp.text)
                              break

                      time.sleep(0.6)

              except Exception as e:
                  print("❌ Erro:", str(e))

          print(f"🏁 FINALIZADO | {baixadas} contas baixadas")

          EOF
