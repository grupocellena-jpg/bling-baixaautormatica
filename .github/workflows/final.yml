name: Baixa automática Bling

on:
  workflow_dispatch:

jobs:
  baixar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Instalar dependências
        run: pip install requests pynacl

      - name: Executar robô Bling
        env:
          CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<EOF
          import requests
          import base64
          import time
          import os
          from nacl import encoding, public

          # =========================
          # 🔐 VARIÁVEIS
          # =========================
          CLIENT_ID = os.getenv("CLIENT_ID")
          CLIENT_SECRET = os.getenv("CLIENT_SECRET")
          REFRESH_TOKEN = os.getenv("REFRESH_TOKEN")
          GH_TOKEN = os.getenv("GH_TOKEN")
          REPO = os.getenv("REPO")

          if not CLIENT_ID or not CLIENT_SECRET or not REFRESH_TOKEN:
              print("❌ Variáveis não carregadas")
              exit()

          # =========================
          # 🔄 TOKEN
          # =========================
          print("🔄 Atualizando token...")

          url = "https://www.bling.com.br/Api/v3/oauth/token"

          auth = f"{CLIENT_ID}:{CLIENT_SECRET}"
          auth_base64 = base64.b64encode(auth.encode()).decode()

          headers = {
              "Authorization": f"Basic {auth_base64}",
              "Content-Type": "application/x-www-form-urlencoded"
          }

          payload = {
              "grant_type": "refresh_token",
              "refresh_token": REFRESH_TOKEN
          }

          res = requests.post(url, headers=headers, data=payload)

          if res.status_code != 200:
              print("❌ ERRO NO TOKEN:", res.text)
              exit()

          data = res.json()
          access_token = data["access_token"]
          new_refresh = data["refresh_token"]

          print("✅ Token atualizado")

          # =========================
          # 🔐 SALVAR REFRESH TOKEN
          # =========================
          print("🔄 Atualizando refresh_token no GitHub...")

          public_key_data = requests.get(
              f"https://api.github.com/repos/{REPO}/actions/secrets/public-key",
              headers={"Authorization": f"Bearer {GH_TOKEN}"}
          ).json()

          public_key = public.PublicKey(
              public_key_data["key"].encode(),
              encoding.Base64Encoder()
          )

          sealed_box = public.SealedBox(public_key)
          encrypted = sealed_box.encrypt(new_refresh.encode())
          encrypted_value = base64.b64encode(encrypted).decode()

          update_res = requests.put(
              f"https://api.github.com/repos/{REPO}/actions/secrets/BLING_REFRESH_TOKEN",
              headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json"
              },
              json={
                  "encrypted_value": encrypted_value,
                  "key_id": public_key_data["key_id"]
              }
          )

          print("STATUS GITHUB:", update_res.status_code)

          # =========================
          # 📡 BUSCAR CONTAS (SEM LOOP INFINITO)
          # =========================
          print("📡 Buscando contas...")

          contas = []
          page = 1
          MAX_PAGES = 50
          last_ids = set()

          while page <= MAX_PAGES:
              url_contas = f"https://www.bling.com.br/Api/v3/contas/receber?pagina={page}"

              r = requests.get(
                  url_contas,
                  headers={"Authorization": f"Bearer {access_token}"}
              )

              if r.status_code != 200:
                  print("⚠️ erro ao buscar página:", r.text)
                  break

              data = r.json()

              if "data" not in data or not data["data"]:
                  print("🚫 Sem mais dados")
                  break

              novos = data["data"]

              # 🔒 proteção contra repetição infinita
              ids_pagina = {c["id"] for c in novos}
              if ids_pagina.issubset(last_ids):
                  print("🚨 Página repetida detectada - encerrando")
                  break

              last_ids.update(ids_pagina)

              print(f"📄 Página {page} OK ({len(novos)} registros)")

              contas.extend(novos)

              page += 1
              time.sleep(0.4)

          print(f"📊 {len(contas)} contas encontradas")

          # =========================
          # 💰 BAIXAR (COM RETRY E RATE LIMIT)
          # =========================
          print("🔄 Iniciando baixa...")

          baixadas = 0

          for c in contas:
              situacao = str(c.get("situacao", ""))

              # 🔥 ajuste aqui conforme Bling
              if situacao not in ["1", "2"]:
                  continue

              id_conta = c["id"]
              valor = c.get("valor", 0)

              tentativas = 0
              sucesso = False

              while tentativas < 3 and not sucesso:
                  r = requests.post(
                      f"https://www.bling.com.br/Api/v3/contas/receber/{id_conta}/baixar",
                      headers={"Authorization": f"Bearer {access_token}"},
                      json={"valor": valor}
                  )

                  if r.status_code in [200, 201]:
                      baixadas += 1
                      print(f"✅ {id_conta}")
                      sucesso = True

                  elif r.status_code == 429:
                      print("⏳ Rate limit, aguardando...")
                      time.sleep(2)

                  else:
                      print(f"⚠️ {id_conta} ->", r.text)
                      break

                  tentativas += 1

              time.sleep(0.4)

          print(f"🏁 FINALIZADO | {baixadas} contas baixadas")
          EOF
