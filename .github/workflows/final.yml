name: Baixa automática Bling (ULTRA RESILIENTE)

on:
  workflow_dispatch:

jobs:
  baixar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - run: pip install requests pynacl

      - name: Executar robô blindado
        env:
          CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}

        run: |
          python - <<EOF
          import requests, base64, time, os
          from datetime import datetime
          from nacl import encoding, public

          CLIENT_ID = os.getenv("CLIENT_ID")
          CLIENT_SECRET = os.getenv("CLIENT_SECRET")
          REFRESH_TOKEN = os.getenv("REFRESH_TOKEN")
          GH_TOKEN = os.getenv("GH_TOKEN")
          REPO = os.getenv("REPO")

          hoje = datetime.now().strftime("%Y-%m-%d")

          def log(msg):
              print(msg, flush=True)

          # =========================
          # TOKEN
          # =========================
          log("🔄 Atualizando token...")
          auth = base64.b64encode(f"{CLIENT_ID}:{CLIENT_SECRET}".encode()).decode()

          res = requests.post(
              "https://www.bling.com.br/Api/v3/oauth/token",
              headers={
                  "Authorization": f"Basic {auth}",
                  "Content-Type": "application/x-www-form-urlencoded"
              },
              data={
                  "grant_type": "refresh_token",
                  "refresh_token": REFRESH_TOKEN
              }
          )

          if res.status_code != 200:
              log(f"❌ ERRO TOKEN: {res.text}")
              exit()

          data = res.json()
          access_token = data["access_token"]
          new_refresh = data["refresh_token"]

          log("✅ Token OK")

          # =========================
          # SALVAR REFRESH
          # =========================
          try:
              key = requests.get(
                  f"https://api.github.com/repos/{REPO}/actions/secrets/public-key",
                  headers={"Authorization": f"Bearer {GH_TOKEN}"}
              ).json()

              pk = public.PublicKey(key["key"].encode(), encoding.Base64Encoder())
              sealed = public.SealedBox(pk)
              encrypted = base64.b64encode(sealed.encrypt(new_refresh.encode())).decode()

              requests.put(
                  f"https://api.github.com/repos/{REPO}/actions/secrets/BLING_REFRESH_TOKEN",
                  headers={"Authorization": f"Bearer {GH_TOKEN}"},
                  json={"encrypted_value": encrypted, "key_id": key["key_id"]}
              )

              log("🔐 Refresh atualizado")
          except Exception as e:
              log(f"⚠️ Falha ao salvar refresh: {e}")

          # =========================
          # 🔍 BUSCAR CONTAS FINANCEIRAS (MULTI ENDPOINT)
          # =========================
          endpoints = [
              "contas/caixas",
              "contas",
              "financeiro/contas"
          ]

          contas_fin = []

          for ep in endpoints:
              try:
                  log(f"🔍 Tentando endpoint: {ep}")
                  r = requests.get(
                      f"https://www.bling.com.br/Api/v3/{ep}",
                      headers={"Authorization": f"Bearer {access_token}"}
                  )

                  data = r.json()

                  if data.get("data"):
                      contas_fin = data["data"]
                      log(f"✅ Encontrou contas em: {ep}")
                      break

              except Exception as e:
                  log(f"⚠️ Erro endpoint {ep}: {e}")

          if not contas_fin:
              log("❌ Nenhuma conta financeira encontrada em nenhum endpoint")
              exit()

          # =========================
          # ESCOLHER CONTA INTELIGENTE
          # =========================
          conta_id = None

          for c in contas_fin:
              nome = str(c.get("descricao", "")).lower()
              if "mercado pago" in nome:
                  conta_id = c["id"]
                  break

          if not conta_id:
              conta_id = contas_fin[0]["id"]

          log(f"🏦 Conta escolhida: {conta_id}")

          # =========================
          # BUSCAR CONTAS A RECEBER
          # =========================
          contas = []
          page = 1
          MAX_PAGES = 100

          while page <= MAX_PAGES:
              r = requests.get(
                  f"https://www.bling.com.br/Api/v3/contas/receber?pagina={page}",
                  headers={"Authorization": f"Bearer {access_token}"}
              )

              data = r.json()

              if not data.get("data"):
                  break

              contas.extend(data["data"])
              log(f"📄 Página {page}")

              page += 1
              time.sleep(0.2)

          log(f"📊 Total contas: {len(contas)}")

          # =========================
          # BAIXA
          # =========================
          baixadas = 0

          for c in contas:
              try:
                  situacao = str(c.get("situacao"))
                  venc = c.get("dataVencimento")

                  if situacao != "1":
                      continue

                  if not venc or venc >= hoje:
                      continue

                  idc = c["id"]
                  valor = float(c.get("valor", 0))

                  payload = {
                      "valor": valor,
                      "dataPagamento": hoje,
                      "conta": {"id": conta_id}
                  }

                  r = requests.post(
                      f"https://www.bling.com.br/Api/v3/contas/receber/{idc}/baixar",
                      headers={"Authorization": f"Bearer {access_token}"},
                      json=payload
                  )

                  if r.status_code in [200, 201]:
                      baixadas += 1
                      log(f"✅ {idc}")

                  elif "já foi baixada" in r.text:
                      continue

                  else:
                      log(f"⚠️ {idc}: {r.text}")

                  time.sleep(0.2)

              except Exception as e:
                  log(f"⚠️ erro item: {e}")

          log(f"🏁 FINAL: {baixadas} baixadas")
          EOF
