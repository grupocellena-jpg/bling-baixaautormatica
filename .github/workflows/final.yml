name: Robo Baixa Oficial Cellena

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  baixa-bling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Dependencias
        run: pip install requests
      - name: Rodar Baixa
        env:
          BLING_API_KEY: ${{ secrets.BLING_API_KEY }}
        run: |
          python - <<EOF
          import os, requests
          from datetime import datetime
          api_key = os.getenv('BLING_API_KEY')
          base_url = "https://bling.com.br/Api/v2"
          hoje = datetime.now().date()
          
          print("🛠️ MOTOR V3 - ATUALIZAÇÃO DIRETA DE STATUS")
          
          def processar():
              # Buscamos as contas 'em aberto'
              r = requests.get(f"{base_url}/contasreceber/json/?filters=situacao[em aberto]&apikey={api_key}")
              if r.status_code != 200:
                  print("Erro na API: Verifique sua chave.")
                  return
              
              dados = r.json().get('retorno', {}).get('contasreceber', [])
              if not dados:
                  print("Nenhuma conta encontrada para processar.")
                  return

              for item in dados:
                  c = item['contaReceber']
                  c_id = c['id']
                  venc = datetime.strptime(c['vencimento'], '%Y-%m-%d').date()
                  
                  if venc < hoje:
                      # XML minimalista para forçar a mudança de situação
                      xml = f"""<?xml version="1.0" encoding="UTF-8"?>
                      <contareceber>
                          <situacao>pago</situacao>
                      </contareceber>"""
                      
                      # Enviamos para a rota de atualização (sem o /liquidar/)
                      url_update = f"{base_url}/contareceber/{c_id}/json/"
                      res = requests.post(url_update, data={'apikey': api_key, 'xml': xml})
                      
                      if "erros" not in res.text.lower():
                          print(f"✅ CONTA {c_id} (Venc: {venc}) -> STATUS ALTERADO PARA PAGO")
                      else:
                          print(f"❌ CONTA {c_id} -> ERRO: {res.text}")

          processar()
          print("🏁 PROCESSO FINALIZADO")
          EOF
