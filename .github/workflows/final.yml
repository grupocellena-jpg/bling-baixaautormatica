name: Baixa automática Bling

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  baixar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests pynacl

      - name: Rodar automação completa
        env:
          CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<EOF
          import requests
          import os
          import time
          from datetime import datetime
          from base64 import b64encode
          from nacl import encoding, public

          CLIENT_ID = os.getenv("CLIENT_ID")
          CLIENT_SECRET = os.getenv("CLIENT_SECRET")
          REFRESH_TOKEN = os.getenv("REFRESH_TOKEN")
          GH_TOKEN = os.getenv("GH_TOKEN")
          REPO = os.getenv("REPO")

          print("🔄 Atualizando token Bling...")

          response = requests.post(
              "https://www.bling.com.br/Api/v3/oauth/token",
              data={
                  "grant_type": "refresh_token",
                  "refresh_token": REFRESH_TOKEN
              },
              auth=(CLIENT_ID, CLIENT_SECRET),
              timeout=10
          )

          token_data = response.json()

          if "access_token" not in token_data:
              print("❌ Erro ao atualizar token:", token_data)
              exit()

          access_token = token_data["access_token"]
          new_refresh_token = token_data["refresh_token"]

          print("✅ Token atualizado")

          # 🔐 Atualizar refresh token no GitHub
          print("🔄 Atualizando refresh_token no GitHub...")

          headers_github = {
              "Authorization": f"Bearer {GH_TOKEN}",
              "Accept": "application/vnd.github+json"
          }

          pk_resp = requests.get(
              f"https://api.github.com/repos/{REPO}/actions/secrets/public-key",
              headers=headers_github,
              timeout=10
          ).json()

          public_key = public.PublicKey(pk_resp["key"].encode(), encoding.Base64Encoder())
          sealed_box = public.SealedBox(public_key)
          encrypted = sealed_box.encrypt(new_refresh_token.encode())
          encrypted_value = b64encode(encrypted).decode()

          requests.put(
              f"https://api.github.com/repos/{REPO}/actions/secrets/BLING_REFRESH_TOKEN",
              headers=headers_github,
              json={
                  "encrypted_value": encrypted_value,
                  "key_id": pk_resp["key_id"]
              },
              timeout=10
          )

          print("✅ Refresh token atualizado no GitHub")

          headers = {
              "Authorization": f"Bearer {access_token}"
          }

          print("📡 Buscando contas...")

          contas = []
          page = 1
          max_pages = 10

          while page <= max_pages:
              print(f"📄 Buscando página {page}...")

              resp = requests.get(
                  f"https://www.bling.com.br/Api/v3/contas/receber?page={page}",
                  headers=headers,
                  timeout=10
              )

              data = resp.json()

              if "data" not in data or not data["data"]:
                  print("🚫 Sem mais dados")
                  break

              contas.extend(data["data"])

              if len(data["data"]) < 100:
                  print("✅ Última página")
                  break

              page += 1
              time.sleep(0.4)

          print(f"📊 {len(contas)} contas encontradas")

          hoje = datetime.now().date()
          baixadas = 0

          print("🔄 Iniciando baixa automática (ATRASADAS)...")

          for conta in contas:
              try:
                  # 🔥 CORREÇÃO AQUI
                  situacao_raw = conta.get("situacao")
                  print(f"DEBUG RAW situação: {situacao_raw}")

                  if isinstance(situacao_raw, dict):
                      situacao = situacao_raw.get("id")
                  else:
                      situacao = situacao_raw

                  data_venc = conta.get("dataVencimento")

                  if not situacao or not data_venc:
                      continue

                  vencimento = datetime.strptime(data_venc, "%Y-%m-%d").date()

                  print(f"🔍 ID {conta['id']} | Situação: {situacao} | Venc: {data_venc}")

                  if situacao == 1 and vencimento < hoje:

                      print(f"⏰ ATRASADA REAL: {conta['id']}")

                      url = f"https://www.bling.com.br/Api/v3/contas/receber/{conta['id']}/baixar"

                      tentativa = 0
                      while tentativa < 3:
                          r = requests.post(url, headers=headers, timeout=10)

                          if r.status_code == 204:
                              print(f"✅ Baixada: {conta['id']}")
                              baixadas += 1
                              break

                          elif r.status_code == 429:
                              print("⏳ Rate limit... aguardando")
                              time.sleep(1.2)

                          elif r.status_code == 400 and "já foi baixada" in r.text:
                              print(f"⚠️ Já estava baixada: {conta['id']}")
                              break

                          else:
                              print(f"❌ Erro {r.status_code}: {r.text}")
                              break

                          tentativa += 1

                      time.sleep(0.4)

              except Exception as e:
                  print(f"❌ Erro na conta {conta.get('id')}: {e}")

          print(f"🏁 FINALIZADO | {baixadas} contas baixadas")
          EOF
