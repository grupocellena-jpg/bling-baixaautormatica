name: Robo Baixa Oficial Cellena

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  baixa-bling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Dependencias
        run: pip install requests
      - name: Rodar Baixa
        env:
          BLING_API_KEY: ${{ secrets.BLING_API_KEY }}
        run: |
          python - <<EOF
          import os, requests
          from datetime import datetime
          api_key = os.getenv('BLING_API_KEY')
          base_url = "https://bling.com.br/Api/v2"
          hoje = datetime.now().date()
          
          print("🛠️ TENTATIVA VIA UPDATE DE SITUAÇÃO")
          
          def processar():
              # Buscamos as contas em aberto
              r = requests.get(f"{base_url}/contasreceber/json/?filters=situacao[em aberto]&apikey={api_key}")
              contas = r.json().get('retorno', {}).get('contasreceber', []) if r.status_code == 200 else []
              
              if not contas:
                  print("Nenhuma conta 'Em aberto' encontrada.")
                  return 0

              baixadas = 0
              for item in contas:
                  c = item['contaReceber']
                  venc = datetime.strptime(c['vencimento'], '%Y-%m-%d').date()
                  
                  if venc < hoje:
                      # XML minimalista apenas para trocar o status para 'pago'
                      xml = f"<?xml version='1.0' encoding='UTF-8'?><contareceber><situacao>pago</situacao></contareceber>"
                      
                      # Usamos POST para a URL de atualização da conta
                      url = f"{base_url}/contareceber/{c['id']}/json/"
                      res = requests.post(url, data={'apikey': api_key, 'xml': xml})
                      
                      if "retorno" in res.text and "erros" not in res.text:
                          print(f"✅ CONTA {c['id']} -> PAGO")
                          baixadas += 1
                      else:
                          print(f"❌ ID {c['id']} BLOQUEADO: {res.text[:100]}")
              return baixadas

          total = processar()
          print(f"🏁 FIM: {total} contas alteradas.")
          EOF
