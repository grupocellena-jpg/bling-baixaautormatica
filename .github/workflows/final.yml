name: Baixa automática Bling (PRO)

on:
  workflow_dispatch:

jobs:
  baixar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - run: pip install requests pynacl

      - name: Executar robô PRO
        env:
          CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<EOF
          import requests, base64, time, os
          from datetime import datetime
          from nacl import encoding, public

          CLIENT_ID = os.getenv("CLIENT_ID")
          CLIENT_SECRET = os.getenv("CLIENT_SECRET")
          REFRESH_TOKEN = os.getenv("REFRESH_TOKEN")
          GH_TOKEN = os.getenv("GH_TOKEN")
          REPO = os.getenv("REPO")

          hoje = datetime.now().strftime("%Y-%m-%d")

          # =========================
          # TOKEN
          # =========================
          print("🔄 Atualizando token...")
          auth = base64.b64encode(f"{CLIENT_ID}:{CLIENT_SECRET}".encode()).decode()

          res = requests.post(
              "https://www.bling.com.br/Api/v3/oauth/token",
              headers={
                  "Authorization": f"Basic {auth}",
                  "Content-Type": "application/x-www-form-urlencoded"
              },
              data={
                  "grant_type": "refresh_token",
                  "refresh_token": REFRESH_TOKEN
              }
          )

          if res.status_code != 200:
              print("❌ Token erro:", res.text)
              exit()

          data = res.json()
          access_token = data["access_token"]
          new_refresh = data["refresh_token"]

          print("✅ Token OK")

          # =========================
          # SALVAR REFRESH
          # =========================
          key = requests.get(
              f"https://api.github.com/repos/{REPO}/actions/secrets/public-key",
              headers={"Authorization": f"Bearer {GH_TOKEN}"}
          ).json()

          pk = public.PublicKey(key["key"].encode(), encoding.Base64Encoder())
          sealed = public.SealedBox(pk)
          enc = base64.b64encode(sealed.encrypt(new_refresh.encode())).decode()

          requests.put(
              f"https://api.github.com/repos/{REPO}/actions/secrets/BLING_REFRESH_TOKEN",
              headers={"Authorization": f"Bearer {GH_TOKEN}"},
              json={"encrypted_value": enc, "key_id": key["key_id"]}
          )

          print("🔐 Refresh atualizado")

          # =========================
          # BUSCAR CONTAS
          # =========================
          contas = []
          page = 1
          MAX = 50

          while page <= MAX:
              r = requests.get(
                  f"https://www.bling.com.br/Api/v3/contas/receber?pagina={page}",
                  headers={"Authorization": f"Bearer {access_token}"}
              )

              data = r.json()

              if not data.get("data"):
                  break

              contas.extend(data["data"])
              print(f"📄 Página {page}")

              page += 1
              time.sleep(0.3)

          print(f"📊 Total: {len(contas)}")

          # =========================
          # BAIXA INTELIGENTE
          # =========================
          baixadas = 0

          for c in contas:
              situacao = str(c.get("situacao"))
              venc = c.get("dataVencimento")

              if situacao != "1":
                  continue

              if not venc or venc >= hoje:
                  continue

              idc = c["id"]
              valor = c.get("valor", 0)

              for tentativa in range(3):
                  r = requests.post(
                      f"https://www.bling.com.br/Api/v3/contas/receber/{idc}/baixar",
                      headers={"Authorization": f"Bearer {access_token}"},
                      json={
                          "valor": valor,
                          "dataPagamento": hoje
                      }
                  )

                  if r.status_code in [200, 201]:
                      baixadas += 1
                      print(f"✅ {idc}")
                      break

                  elif r.status_code == 429:
                      print("⏳ Rate limit...")
                      time.sleep(2)

                  else:
                      if "já foi baixada" in r.text:
                          break
                      print("⚠️", r.text)
                      break

              time.sleep(0.3)

          print(f"🏁 FINALIZADO: {baixadas} baixadas")
          EOF
