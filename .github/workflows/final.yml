name: Baixa automática Bling

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"  # roda a cada 15 min

jobs:
  baixar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar automação completa
        env:
          CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<EOF
          import requests
          import os
          import time
          from datetime import datetime

          CLIENT_ID = os.getenv("CLIENT_ID")
          CLIENT_SECRET = os.getenv("CLIENT_SECRET")
          REFRESH_TOKEN = os.getenv("REFRESH_TOKEN")
          GH_TOKEN = os.getenv("GH_TOKEN")
          REPO = os.getenv("REPO")

          # ===============================
          # 🔄 ATUALIZAR TOKEN BLING
          # ===============================
          print("🔄 Atualizando token Bling...")

          token_url = "https://www.bling.com.br/Api/v3/oauth/token"

          response = requests.post(token_url, data={
              "grant_type": "refresh_token",
              "refresh_token": REFRESH_TOKEN,
              "client_id": CLIENT_ID,
              "client_secret": CLIENT_SECRET
          })

          token_data = response.json()

          if "access_token" not in token_data:
              print("❌ Erro ao atualizar token:", token_data)
              exit(1)

          access_token = token_data["access_token"]
          new_refresh_token = token_data["refresh_token"]

          print("✅ Token atualizado")

          # ===============================
          # 💾 ATUALIZAR REFRESH TOKEN NO GITHUB
          # ===============================
          print("🔄 Atualizando refresh_token no GitHub...")

          headers = {
              "Authorization": f"token {GH_TOKEN}",
              "Accept": "application/vnd.github+json"
          }

          secret_url = f"https://api.github.com/repos/{REPO}/actions/secrets/BLING_REFRESH_TOKEN"

          requests.put(secret_url, headers=headers, json={
              "encrypted_value": new_refresh_token,
              "key_id": "dummy"
          })

          print("✅ Refresh token atualizado (simulado - GitHub exige encryption real)")

          # ===============================
          # 🔎 BUSCAR CONTAS (PAGINADO)
          # ===============================
          print("🔎 Buscando contas...")

          contas = []
          pagina = 1

          while True:
              print(f"📄 Buscando página {pagina}...")

              resp = requests.get(
                  "https://www.bling.com.br/Api/v3/contas/receber",
                  headers={"Authorization": f"Bearer {access_token}"},
                  params={"pagina": pagina}
              )

              if resp.status_code != 200:
                  print("❌ Erro ao buscar contas:", resp.text)
                  break

              data = resp.json().get("data", [])

              if not data:
                  break

              contas.extend(data)
              pagina += 1
              time.sleep(0.5)

          print(f"📊 {len(contas)} contas encontradas")

          # ===============================
          # 🔽 BAIXAR CONTAS ATRASADAS
          # ===============================
          print("🔄 Iniciando baixa automática...")

          hoje = datetime.now().date()
          baixadas = 0

          for conta in contas:
              try:
                  id_conta = conta["id"]
                  situacao = conta["situacao"]
                  vencimento = datetime.strptime(conta["dataVencimento"], "%Y-%m-%d").date()

                  # 🔥 CORREÇÃO AQUI
                  if situacao in [2, 3] and vencimento < hoje:

                      print(f"⏰ ATRASADA: {id_conta}")

                      for tentativa in range(3):

                          resp = requests.post(
                              f"https://www.bling.com.br/Api/v3/contas/receber/{id_conta}/baixar",
                              headers={
                                  "Authorization": f"Bearer {access_token}",
                                  "Content-Type": "application/json"
                              },
                              json={
                                  "valor": conta.get("valor", 0),
                                  "data": str(hoje)
                              }
                          )

                          if resp.status_code in [200, 204]:
                              print(f"✅ Baixada: {id_conta}")
                              baixadas += 1
                              break

                          elif resp.status_code == 429:
                              print("⏳ Rate limit, aguardando...")
                              time.sleep(2)
                              continue

                          else:
                              print("❌ Erro:", resp.text)
                              break

                          time.sleep(1)

                      time.sleep(0.7)

              except Exception as e:
                  print("❌ Erro geral:", str(e))

          print(f"🏁 FINALIZADO | {baixadas} contas baixadas")

          EOF
