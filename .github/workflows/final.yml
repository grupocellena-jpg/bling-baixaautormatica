- name: Rodar Baixa
  env:
    BLING_CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
    BLING_CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
    BLING_REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
  run: |
    python - <<EOF
    import os, requests
    from datetime import datetime

    CLIENT_ID = os.getenv("BLING_CLIENT_ID")
    CLIENT_SECRET = os.getenv("BLING_CLIENT_SECRET")
    REFRESH_TOKEN = os.getenv("BLING_REFRESH_TOKEN")

    print("🔄 Atualizando token...")

    # 🔁 Atualiza o access token
    token_url = "https://api.bling.com.br/Api/v3/oauth/token"
    payload = {
        "grant_type": "refresh_token",
        "refresh_token": REFRESH_TOKEN,
        "client_id": CLIENT_ID,
        "client_secret": CLIENT_SECRET
    }

    res = requests.post(token_url, data=payload)
    data = res.json()

    if "access_token" not in data:
        print("❌ Erro ao atualizar token:", data)
        exit()

    access_token = data["access_token"]
    print("✅ Token atualizado")

    headers = {
        "Authorization": f"Bearer {access_token}"
    }

    print("📡 Buscando contas...")

    url = "https://api.bling.com.br/Api/v3/contas/receber"
    r = requests.get(url, headers=headers)

    print("STATUS:", r.status_code)
    print("RESPOSTA:", r.text)

    print("🏁 FINALIZADO")
    EOF
