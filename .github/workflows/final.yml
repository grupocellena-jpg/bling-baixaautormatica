name: Robo Baixa Oficial Cellena

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  baixa-bling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Dependencias
        run: pip install requests
      - name: Rodar Baixa
        env:
          BLING_API_KEY: ${{ secrets.BLING_API_KEY }}
        run: |
          python - <<EOF
          import os, requests
          from datetime import datetime
          api_key = os.getenv('BLING_API_KEY')
          base_url = "https://bling.com.br/Api/v2"
          hoje = datetime.now().date()
          print("🛠️ INICIANDO MOTOR FINAL (Atrasadas + Em Aberto Vencidas)")
          def buscar(sit):
              r = requests.get(f"{base_url}/contasreceber/json/?filters=situacao[{sit}]&apikey={api_key}")
              return r.json().get('retorno', {}).get('contasreceber', []) if r.status_code == 200 else []
          todas = buscar('atrasada') + buscar('em aberto')
          processadas = 0
          for item in todas:
              c = item['contaReceber']
              venc_str = c.get('vencimento')
              if venc_str:
                  venc = datetime.strptime(venc_str, '%Y-%m-%d').date()
                  if venc < hoje:
                      res = requests.post(f"{base_url}/contareceber/{c['id']}/liquidar/json/?apikey={api_key}")
                      if res.status_code == 200:
                          print(f"✅ Conta {c['id']} (Venc: {venc_str}) baixada!")
                          processadas += 1
          print(f"🏁 FIM: {processadas} contas processadas.")
          EOF
