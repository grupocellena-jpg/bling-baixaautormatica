name: baixa-bling

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # roda a cada 30 minutos

jobs:
  baixa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar Baixa
        env:
          CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
        run: |
          python - <<EOF
          import requests
          import os
          import time
          from datetime import datetime

          print("🔍 DEBUG VARIÁVEIS:")
          print("CLIENT_ID:", os.getenv("CLIENT_ID")[:5] + "***")
          print("CLIENT_SECRET (inicio):", os.getenv("CLIENT_SECRET")[:5])
          print("REFRESH_TOKEN:", "***")

          CLIENT_ID = os.getenv("CLIENT_ID")
          CLIENT_SECRET = os.getenv("CLIENT_SECRET")
          REFRESH_TOKEN = os.getenv("REFRESH_TOKEN")

          # =========================
          # 🔐 ATUALIZAR TOKEN
          # =========================
          print("🔄 Atualizando token...")

          token_url = "https://api.bling.com.br/Api/v3/oauth/token"

          payload = {
              "grant_type": "refresh_token",
              "refresh_token": REFRESH_TOKEN
          }

          response = requests.post(
              token_url,
              data=payload,
              auth=(CLIENT_ID, CLIENT_SECRET)
          )

          token_data = response.json()
          print("📡 RESPOSTA TOKEN:", token_data)

          if "access_token" not in token_data:
              print("❌ Erro ao atualizar token")
              exit(1)

          access_token = token_data["access_token"]

          print("✅ Token atualizado")
          print("🔄 NOVO REFRESH TOKEN:")
          print(token_data.get("refresh_token"))

          headers = {
              "Authorization": f"Bearer {access_token}",
              "Content-Type": "application/json"
          }

          # =========================
          # 📥 BUSCAR CONTAS
          # =========================
          print("📡 Buscando contas...")

          url = "https://api.bling.com.br/Api/v3/contas/receber"

          params = {
              "pagina": 1,
              "limite": 100
          }

          res = requests.get(url, headers=headers, params=params)

          print("STATUS:", res.status_code)

          if res.status_code != 200:
              print("❌ Erro ao buscar contas")
              print(res.text)
              exit(1)

          data = res.json()
          contas = data.get("data", [])

          print(f"📊 {len(contas)} contas encontradas")

          # =========================
          # 🔄 BAIXA AUTOMÁTICA
          # =========================
          print("🔄 Iniciando baixa automática (ATRASADAS)...")

          hoje = datetime.now().date()

          for conta in contas:
              try:
                  vencimento = datetime.strptime(conta["vencimento"], "%Y-%m-%d").date()

                  # 🔥 REGRA CORRETA
                  if conta["situacao"] == 1 and vencimento < hoje:

                      print(f"⏰ ATRASADA: {conta['id']} | Venc: {conta['vencimento']} | R$ {conta['valor']}")

                      baixa_url = f"https://api.bling.com.br/Api/v3/contas/receber/{conta['id']}/baixar"

                      payload = {
                          "data": {
                              "data": str(hoje),
                              "valor": conta["valor"]
                          }
                      }

                      res_baixa = requests.post(baixa_url, json=payload, headers=headers)

                      print("STATUS BAIXA:", res_baixa.status_code)
                      print("RESPOSTA:", res_baixa.text)

                      # 🔥 CONTROLE DE RATE LIMIT
                      time.sleep(0.4)

              except Exception as e:
                  print(f"⚠️ Erro na conta {conta.get('id')}: {str(e)}")

          print("🏁 FINALIZADO")
          EOF

      - name: Complete job
        run: echo "Processo finalizado"
