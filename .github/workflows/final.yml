name: Robo Baixa Oficial Cellena

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  baixa-bling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Dependencias
        run: pip install requests
      - name: Rodar Baixa
        env:
          BLING_API_KEY: ${{ secrets.BLING_API_KEY }}
        run: |
          python - <<EOF
          import os, requests
          from datetime import datetime
          api_key = os.getenv('BLING_API_KEY')
          base_url = "https://bling.com.br/Api/v2"
          hoje = datetime.now().strftime('%d/%m/%Y')
          
          print(f"🛠️ MOTOR FINAL - MODO LIQUIDAÇÃO FORÇADA ({hoje})")
          
          def processar():
              # Busca contas em aberto e atrasadas
              processadas = 0
              for sit in ['em aberto', 'atrasada']:
                  r = requests.get(f"{base_url}/contasreceber/json/?filters=situacao[{sit}]&apikey={api_key}")
                  if r.status_code != 200: continue
                  
                  contas = r.json().get('retorno', {}).get('contasreceber', [])
                  for item in contas:
                      c = item['contaReceber']
                      c_id = c.get('id')
                      valor = c.get('valor')
                      venc_str = c.get('vencimento')
                      
                      if venc_str and datetime.strptime(venc_str, '%Y-%m-%d').date() < datetime.now().date():
                          # XML de liquidação forçada com valor total e data de hoje
                          xml_liq = f"""<?xml version="1.0" encoding="UTF-8"?>
                          <pagamento>
                            <data>{hoje}</data>
                            <valor>{valor}</valor>
                          </pagamento>"""
                          
                          url_liq = f"{base_url}/contareceber/{c_id}/liquidar/json/"
                          res = requests.post(url_liq, data={'apikey': api_key, 'xml': xml_liq})
                          
                          if "sucesso" in res.text.lower():
                              print(f"✅ SUCESSO: Conta {c_id} Liquidada! (R$ {valor})")
                              processadas += 1
                          else:
                              print(f"⚠️ AVISO: Conta {c_id} não liquidou. Resposta: {res.text[:100]}")
              return processadas

          total = processar()
          print(f"🏁 FIM: {total} contas processadas.")
          EOF
